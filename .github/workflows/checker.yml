name: Site health check

# checker.js 로 각 사이트(url)를 점검 → employees.json 의 status 갱신.
# 변경이 있으면 main 에 자동 커밋·push → GitHub Pages(브랜치 배포)가 자동 반영.

on:
  schedule:
    - cron: '*/15 * * * *'   # 15분마다 (UTC 기준 · 실제 실행은 다소 지연될 수 있음)
  workflow_dispatch: {}        # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write              # employees.json 커밋·push 권한

concurrency:
  group: site-health-check     # 동시 실행 방지 (커밋 충돌 예방)
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run health checker
        run: node checker.js

      - name: Commit status changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- employees.json; then
            echo "상태 변경 없음 — 커밋 생략"
          else
            git add employees.json
            git commit -m "chore: 사이트 상태 자동 갱신 [skip ci]"
            git push
          fi
