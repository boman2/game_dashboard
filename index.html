<!-- 온라인상사 · LIVE OFFICE — 2단계: 어두운 우드톤 오피스 레이아웃 + 레고 캐릭터 -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>온라인상사 · LIVE OFFICE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root{
    --sig-green:#22c55e; --sig-yellow:#f5c518; --sig-red:#ef4444; --sig-blue:#3b82f6;
    --wood:#3a2c1f; --wood-d:#2a1f15; --wood-l:#4d3a28;
    --floor:#5a432d; --floor-d:#4a3624;
    --ink:#efe4d4; --muted:#b7a489;
    --shelf:#caa472; --shelf-d:#a97f4f;
    --cream:#f6ecdb;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:'Noto Sans KR',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 50% -10%, #3a2c20 0%, transparent 55%),
      radial-gradient(circle at 0% 100%, #241812 0%, transparent 45%),
      linear-gradient(180deg,#1d1510 0%, #181009 100%);
    background-attachment:fixed;
    min-height:100vh;
    padding:16px 12px 36px;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,.jua{font-family:'Jua',sans-serif;font-weight:400;letter-spacing:.5px}
  .stage{max-width:1100px;margin:0 auto}

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    background:linear-gradient(180deg,#2c2440,#1c1730);
    color:#fff;border-radius:16px;padding:13px 18px;
    box-shadow:0 6px 0 #120e22, 0 14px 24px rgba(0,0,0,.5);
    margin-bottom:18px;border:1px solid rgba(255,255,255,.06);
  }
  .brand{font-size:22px;display:flex;align-items:center;gap:9px;font-family:'Jua'}
  .brand .live{
    font-family:'Noto Sans KR';font-weight:700;font-size:10.5px;letter-spacing:2px;
    background:#ff5670;color:#fff;padding:3px 8px;border-radius:20px;
    display:inline-flex;align-items:center;gap:6px;
  }
  .brand .live::before{content:"";width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1.1s infinite}
  @keyframes blink{50%{opacity:.25}}
  .spacer{flex:1}
  .clock{font-family:'Jua';font-size:20px;background:rgba(255,255,255,.10);
    padding:4px 14px;border-radius:12px;letter-spacing:2px}
  .todo-badge{
    display:flex;align-items:center;gap:8px;cursor:pointer;
    background:#fdd835;color:#5a4500;font-weight:700;font-size:13px;
    padding:8px 13px;border-radius:14px;box-shadow:0 4px 0 #c9a900;
    transition:transform .12s, box-shadow .12s;
  }
  .todo-badge:active{transform:translateY(3px);box-shadow:0 1px 0 #c9a900}
  .todo-badge .count{background:#e53935;color:#fff;border-radius:20px;
    min-width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;padding:0 5px}

  /* ---------- rooms grid ---------- */
  .rooms{display:flex;flex-direction:column;gap:16px}
  .rooms.bottom{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-top:16px}

  .room{
    position:relative;border-radius:16px;padding:34px 14px 14px;
    background:linear-gradient(180deg,var(--wood) 0%, var(--wood-d) 64px) padding-box,
               var(--floor);
    background:
      linear-gradient(180deg,var(--wood),var(--wood-d) 70px),
      repeating-linear-gradient(90deg,var(--floor) 0 26px,var(--floor-d) 26px 27px);
    border:2px solid var(--rb,#5a4632);
    box-shadow:0 0 0 1px rgba(0,0,0,.4) inset, 0 10px 22px rgba(0,0,0,.45),
               0 0 16px -2px var(--rg,transparent);
  }
  .room.wide{grid-column:1/-1}
  .room-tab{
    position:absolute;top:-1px;left:14px;display:flex;align-items:center;gap:7px;
    background:linear-gradient(180deg,#4a3a28,#33271a);color:var(--ink);
    font-family:'Jua';font-size:14px;padding:5px 13px;border-radius:0 0 12px 12px;
    box-shadow:0 3px 6px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.05);border-top:0;
  }
  .room-tab .rst{width:9px;height:9px;border-radius:50%;box-shadow:0 0 6px 1px currentColor}
  .room-note{position:absolute;top:8px;right:14px;font-size:10.5px;color:var(--muted);
    max-width:55%;text-align:right;line-height:1.3}
  .room-site{display:inline-block;margin-top:3px;background:#16324d;color:#7fc0ff;
    font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid #25506f}

  .seats{display:flex;flex-wrap:wrap;gap:10px 6px;justify-content:flex-start;
    align-items:flex-end;margin-top:10px}

  /* ---------- seat (character + desk) ---------- */
  .seat{position:relative;width:96px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;padding-top:26px;
    transition:transform .14s}
  .seat:hover{transform:translateY(-3px)}

  .seat .bubble{position:absolute;top:0;left:50%;transform:translateX(-50%) scale(.9);
    background:var(--cream);border-radius:11px;padding:3px 8px;
    font-size:10px;font-weight:600;white-space:nowrap;color:#5a4a33;
    box-shadow:0 3px 7px rgba(0,0,0,.4);z-index:5;opacity:0;pointer-events:none;
    transition:opacity .14s, transform .14s}
  .seat:hover .bubble{opacity:1;transform:translateX(-50%) scale(1)}
  .seat .bubble::after{content:"";position:absolute;bottom:-5px;left:50%;margin-left:-5px;
    width:10px;height:10px;background:var(--cream);transform:rotate(45deg)}

  .mini{position:relative;display:flex;flex-direction:column;align-items:center}
  .mini .fig{width:52px;height:66px}
  .mini .sig{position:absolute;top:-4px;right:14px;width:13px;height:13px;border-radius:50%;
    box-shadow:0 0 0 3px rgba(20,14,9,.6);z-index:4}
  .sig.green{background:var(--sig-green);box-shadow:0 0 0 3px rgba(20,14,9,.6),0 0 9px 1px var(--sig-green);animation:pulse 1.7s infinite}
  .sig.yellow{background:var(--sig-yellow);box-shadow:0 0 0 3px rgba(20,14,9,.6),0 0 7px 1px var(--sig-yellow)}
  .sig.red{background:var(--sig-red);box-shadow:0 0 0 3px rgba(20,14,9,.6),0 0 9px 1px var(--sig-red);animation:pulse .85s infinite}
  .sig.blue{background:var(--sig-blue);box-shadow:0 0 0 3px rgba(20,14,9,.6),0 0 7px 1px var(--sig-blue)}
  @keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.45)}}

  .mini .notif{position:absolute;top:-6px;left:10px;background:#e53935;color:#fff;
    font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:20px;
    display:flex;align-items:center;justify-content:center;padding:0 4px;z-index:4;
    box-shadow:0 1px 3px rgba(0,0,0,.5)}

  /* desk + monitor */
  .desk{position:relative;width:78px;height:18px;margin-top:-8px;border-radius:5px;
    background:linear-gradient(180deg,var(--shelf),var(--shelf-d));
    box-shadow:0 4px 0 #6f4f2d,0 7px 8px rgba(0,0,0,.4)}
  .desk .mon{position:absolute;top:-15px;left:50%;transform:translateX(-50%);
    width:30px;height:20px;background:#0e1a26;border:2px solid #060d14;border-radius:3px;
    box-shadow:0 0 9px rgba(90,170,255,.45)}
  .desk .mon::after{content:"";position:absolute;inset:2px;border-radius:2px;
    background:linear-gradient(135deg,#1d4e7a,#0c2236)}
  .desk .plant{position:absolute;top:-12px;right:-2px;font-size:13px;filter:saturate(1.2)}

  .nameplate{margin-top:8px;background:var(--cream);border-radius:9px;padding:2px 9px;
    font-family:'Jua';font-size:12.5px;color:#3a2c1c;box-shadow:0 2px 5px rgba(0,0,0,.35)}
  .nameplate .star{color:#ffb300}
  .role{font-size:9.5px;color:var(--muted);margin-top:3px;text-align:center;max-width:92px;
    font-weight:500;line-height:1.25}

  /* ---------- meeting room & lounge ---------- */
  .mt-cap{text-align:center;font-family:'Jua';color:var(--ink);font-size:14px;margin:6px 0 2px}
  .mt-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:10px}
  .mtable{position:relative;width:74%;max-width:340px;height:92px;margin:6px auto 30px;
    border-radius:50%;
    background:radial-gradient(circle at 50% 35%,#6b4f33,#3f2d1a);
    box-shadow:0 8px 18px rgba(0,0,0,.5),0 0 0 6px rgba(0,0,0,.18)}
  .chair{position:absolute;width:16px;height:16px;border-radius:5px;
    background:linear-gradient(180deg,#4a3a28,#2f2316);box-shadow:0 2px 4px rgba(0,0,0,.5)}

  .lounge{display:flex;align-items:flex-end;gap:14px;justify-content:center;
    flex-wrap:wrap;padding:8px 0 4px}
  .sofa{width:120px;height:42px;border-radius:14px 14px 8px 8px;
    background:linear-gradient(180deg,#3f5a6e,#2b3d4a);
    box-shadow:inset 0 6px 0 rgba(255,255,255,.06),0 6px 12px rgba(0,0,0,.45);position:relative}
  .sofa::before,.sofa::after{content:"";position:absolute;bottom:6px;width:14px;height:18px;
    border-radius:8px;background:#33485a}
  .sofa::before{left:-7px} .sofa::after{right:-7px}
  .lounge .deco{font-size:24px;align-self:center}
  .lounge .l-bubble{background:var(--cream);color:#5a4a33;font-size:11px;font-weight:600;
    padding:5px 11px;border-radius:12px;box-shadow:0 3px 7px rgba(0,0,0,.4);align-self:center}

  /* ---------- footer legend ---------- */
  .legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:20px;
    font-size:11.5px;color:var(--muted);line-height:1.6}
  .legend .row{flex-basis:100%;text-align:center}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:10px;height:10px;border-radius:50%}

  /* ---------- modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(10,7,4,.6);display:none;
    align-items:center;justify-content:center;padding:18px;z-index:50}
  .scrim.on{display:flex}
  .modal{background:#241a12;color:var(--ink);border:1px solid rgba(255,255,255,.07);
    border-radius:20px;max-width:380px;width:100%;padding:22px;
    box-shadow:0 20px 50px rgba(0,0,0,.6);animation:pop .18s ease}
  @keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
  .modal .mhead{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .modal .mhead .fig{width:64px;height:80px}
  .modal .mname{font-family:'Jua';font-size:21px}
  .modal .mrole{font-size:12px;color:var(--muted);margin-bottom:14px}
  .modal .msite{display:inline-block;margin-bottom:8px;background:#16324d;color:#7fc0ff;
    font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
  .modal .tsec{font-size:12px;font-weight:700;color:var(--muted);margin:12px 0 6px}
  .modal .titem{display:flex;align-items:center;gap:9px;font-size:13px;padding:6px 0;border-top:1px solid rgba(255,255,255,.07)}
  .modal .titem .tdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .live-on .tdot{background:var(--sig-green)} .plan-on .tdot{background:var(--sig-blue)}
  .mbtns{display:flex;gap:8px;margin-top:18px}
  .mbtns button{flex:1;border:0;border-radius:12px;padding:11px;font-family:'Jua';font-size:14px;cursor:pointer}
  .btn-down{background:#5a1f1f;color:#ffb4b4;box-shadow:0 3px 0 #3a1212}
  .btn-up{background:#1f4a23;color:#bff0c5;box-shadow:0 3px 0 #123012}
  .btn-close{background:#3a3026;color:#cdbfac;box-shadow:0 3px 0 #241c14}
  .mbtns button:active{transform:translateY(3px);box-shadow:none}

  /* ---------- todo board ---------- */
  .board{background:#241a12;border:1px solid rgba(255,255,255,.06);border-radius:16px;
    padding:18px;margin-top:18px;box-shadow:0 8px 22px rgba(0,0,0,.4)}
  .board h2{margin:0 0 4px;font-size:18px;display:flex;align-items:center;gap:8px}
  .board .sub{font-size:12px;color:var(--muted);margin-bottom:12px}
  .todo-grid{display:flex;flex-direction:column;gap:8px}
  .todo{display:flex;align-items:center;gap:12px;background:#1b2a3a;border:1px solid #25506f;
    border-radius:11px;padding:10px 14px;font-size:13px;color:#cfe2f5;
    transition:transform .12s,background .12s}
  .todo:hover{transform:translateX(3px);background:#21384c}
  .todo .check{width:20px;height:20px;border-radius:6px;border:2px solid #4a90d9;background:#0e1a26;
    flex:0 0 auto;position:relative}
  .todo .check::after{content:"";position:absolute;inset:3px;border-radius:3px;background:#3b82f6;opacity:.18}
  .todo .txt{flex:1}
  .todo .who{font-size:10.5px;color:#9fc0ff;background:#16324d;
    padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}

  @media(max-width:560px){
    .brand{font-size:18px} .clock{font-size:16px}
    .seat{width:84px}
  }
</style>

<div class="stage">
  <div class="topbar">
    <div class="brand">🏢 <span id="coName">온라인상사</span> <span class="live">LIVE OFFICE</span></div>
    <div class="spacer"></div>
    <div class="clock" id="clock">00:00</div>
    <div class="todo-badge" onclick="document.getElementById('board').scrollIntoView({behavior:'smooth'})">
      📋 할 일판 <span class="count" id="todoCount">0</span>
    </div>
  </div>

  <div class="board" id="board">
    <h2>📋 할 일판 <span style="font-size:13px;color:var(--muted);font-weight:400">· 가동 예정 (계획중)</span></h2>
    <div class="sub">아직 운영 전인 일들의 체크리스트입니다. 가동되면 담당 캐릭터 신호등이 <b style="color:#22c55e">초록</b>으로 켜져요.</div>
    <div class="todo-grid" id="todoGrid"></div>
  </div>

  <div class="rooms" id="office"></div>
  <div class="rooms bottom" id="officeBottom"></div>

  <div class="legend" id="legend"></div>
</div>

<div class="scrim" id="scrim" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
// 데이터는 employees.json(단일 소스)에서 fetch 한다. 아래 init()가 로드 후 render()를 부른다.
let DATA = null;

/* ----- human character as SVG ----- */
function hairSVG(style){
  const c = {
    "braids-red":"#c0392b","long-black":"#221c2e","short-gray":"#9e9e9e",
    "short-brown":"#5d4037","bun-brown":"#8d6e63","bun-gray":"#6d6d6d","wavy-brown":"#7a4f33"
  }[style] || "#5d4037";
  switch(style){
    case "braids-red": // 빨간머리 앤 — 양 갈래 땋은 머리
      return `<path d="M23 36 Q23 17 40 16 Q57 17 57 36 Q48 26 40 26 Q32 26 23 36 Z" fill="${c}"/>
              <path d="M24 34 q-5 14 0 28 l6 -1 q-4 -13 -1 -24 Z" fill="${c}"/>
              <path d="M56 34 q5 14 0 28 l-6 -1 q4 -13 1 -24 Z" fill="${c}"/>
              <circle cx="27" cy="64" r="3.4" fill="${c}"/><circle cx="53" cy="64" r="3.4" fill="${c}"/>`;
    case "long-black": // 긴 생머리
      return `<path d="M22 38 Q22 16 40 15 Q58 16 58 38 Q49 25 40 25 Q31 25 22 38 Z" fill="${c}"/>
              <path d="M22 36 q-3 20 2 34 l6 -1 q-4 -17 -2 -30 Z" fill="${c}"/>
              <path d="M58 36 q3 20 -2 34 l-6 -1 q4 -17 2 -30 Z" fill="${c}"/>`;
    case "wavy-brown": // 웨이브
      return `<path d="M22 38 Q22 16 40 15 Q58 16 58 38 Q50 28 40 29 Q30 28 22 38 Z" fill="${c}"/>
              <path d="M23 36 q-4 13 1 24 l5 -1 q-3 -11 -1 -20 Z" fill="${c}"/>
              <path d="M57 36 q4 13 -1 24 l-5 -1 q3 -11 1 -20 Z" fill="${c}"/>`;
    case "bun-brown": case "bun-gray": // 올림머리 (번)
      return `<circle cx="40" cy="17" r="7" fill="${c}"/>
              <path d="M24 36 Q24 19 40 19 Q56 19 56 36 Q48 27 40 27 Q32 27 24 36 Z" fill="${c}"/>`;
    default: // 짧은 머리
      return `<path d="M24 37 Q24 18 40 18 Q56 18 56 37 Q56 27 40 27 Q24 27 24 37 Z" fill="${c}"/>`;
  }
}
function beardSVG(style){
  return style==="short-gray"
    ? `<path d="M30 46 q10 9 20 0 q-2 8 -10 9 q-8 -1 -10 -9 Z" fill="#cfcfcf"/>` : "";
}
function figSVG(e){
  const skin = e.skin || "#f3c49a";
  return `<svg class="fig" width="96" height="120" viewBox="0 0 80 110">
    <!-- legs / pants -->
    <rect x="30" y="88" width="9" height="20" rx="4" fill="#3a4a63"/>
    <rect x="41" y="88" width="9" height="20" rx="4" fill="#3a4a63"/>
    <!-- shoes -->
    <ellipse cx="34" cy="108" rx="6" ry="3" fill="#23232b"/>
    <ellipse cx="46" cy="108" rx="6" ry="3" fill="#23232b"/>
    <!-- torso / shirt -->
    <path d="M26 62 q14 -8 28 0 l4 30 q-18 6 -36 0 Z" fill="${e.shirt}"/>
    <!-- arms -->
    <path d="M26 64 q-8 4 -7 22 l7 2 q1 -13 6 -17 Z" fill="${e.shirt}"/>
    <path d="M54 64 q8 4 7 22 l-7 2 q-1 -13 -6 -17 Z" fill="${e.shirt}"/>
    <!-- hands -->
    <circle cx="20" cy="87" r="4.5" fill="${skin}"/>
    <circle cx="60" cy="87" r="4.5" fill="${skin}"/>
    <!-- neck -->
    <rect x="35" y="52" width="10" height="11" rx="3" fill="${skin}"/>
    <!-- head + ears -->
    <circle cx="40" cy="38" r="16" fill="${skin}"/>
    <circle cx="24" cy="38" r="3" fill="${skin}"/>
    <circle cx="56" cy="38" r="3" fill="${skin}"/>
    <!-- eyes -->
    <circle cx="34" cy="39" r="2.2" fill="#3a2c22"/>
    <circle cx="46" cy="39" r="2.2" fill="#3a2c22"/>
    <!-- blush -->
    <circle cx="30" cy="45" r="2.6" fill="#ff9a8a" opacity=".45"/>
    <circle cx="50" cy="45" r="2.6" fill="#ff9a8a" opacity=".45"/>
    <!-- smile -->
    <path d="M35 46 q5 4 10 0" stroke="#a85b43" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    ${beardSVG(e.hair)}
    ${hairSVG(e.hair)}
  </svg>`;
}

/* ----- helpers ----- */
const SIG = {green:"#22c55e",yellow:"#f5c518",red:"#ef4444",blue:"#3b82f6"};
const ICON = {"경영·관제":"👔","제작·자동화":"⚙️","사업부":"🏪"};
function roomIcon(name){ return ICON[name] || "🗂️"; }
// 방 전체 상태: 하나라도 red면 red, 아니면 yellow, 아니면 green
function roomStatus(f){
  const st = f.employees.map(e=>e.status);
  if(st.includes("red")) return "red";
  if(st.includes("yellow")) return "yellow";
  if(st.every(s=>s==="green")) return "green";
  return "blue";
}
function plannedCount(e){ return (e.tasks||[]).filter(t=>t.state==="계획중").length; }

/* ----- render ----- */
const officeEl = document.getElementById('office');
const officeBottomEl = document.getElementById('officeBottom');

function seatCard(level,i,e){
  const star = e.lead ? '<span class="star">★</span> ' : '';
  const pc = plannedCount(e);
  const notif = pc ? `<span class="notif">${pc}</span>` : '';
  const plant = (i % 2 === 0) ? '<span class="plant">🪴</span>' : '';
  return `<div class="seat" onclick="openModal(${level},${i})">
    <div class="bubble">${e.bubble || ''}</div>
    <div class="mini">
      <div class="sig ${e.status}" data-id="${level}-${i}"></div>
      ${notif}
      ${figSVG(e)}
    </div>
    <div class="desk"><div class="mon"></div>${plant}</div>
    <div class="nameplate">${star}${e.name}</div>
    <div class="role">${e.role}</div>
  </div>`;
}

function roomCard(f){
  const rs = roomStatus(f);
  const seats = f.employees.map((e,i)=>seatCard(f.level,i,e)).join('');
  const site = f.employees.find(e=>e.site);
  const note = site ? `<div class="room-note">담당 사이트<div class="room-site">${site.site}</div></div>` : '';
  return `<div class="room" style="--rb:${SIG[rs]};--rg:${SIG[rs]}">
    <div class="room-tab"><span class="rst" style="color:${SIG[rs]}"></span>${roomIcon(f.name)} ${f.level}F · ${f.name}</div>
    ${note}
    <div class="seats">${seats}</div>
  </div>`;
}

function meetingLoungeHTML(){
  const chairs = [
    "left:18%;top:-9px","left:42%;top:-9px","left:66%;top:-9px",
    "left:18%;bottom:-9px","left:42%;bottom:-9px","left:66%;bottom:-9px",
    "left:-9px;top:38%","right:-9px;top:38%"
  ].map(s=>`<div class="chair" style="${s}"></div>`).join('');
  const meeting = `<div class="room" style="--rb:#5a4632;--rg:transparent">
    <div class="room-tab">🪑 회의실</div>
    <div class="mt-cap">부서별 진행상황 · 안건</div>
    <div class="mt-sub">정기 스탠드업 · 사이트 점검 리뷰</div>
    <div class="mtable">${chairs}</div>
  </div>`;
  const lounge = `<div class="room" style="--rb:#5a4632;--rg:transparent">
    <div class="room-tab">☕ 탕비실 · 휴게</div>
    <div class="mt-sub" style="margin-top:6px">잠깐 쉬어가는 공간</div>
    <div class="lounge">
      <span class="deco">🪴</span>
      <div class="sofa"></div>
      <span class="deco">☕</span>
      <div class="l-bubble">수고 많으십니다 :)</div>
    </div>
  </div>`;
  return meeting + lounge;
}

function renderLegend(){
  const emps = DATA.floors.reduce((n,f)=>n+f.employees.length,0);
  const depts = DATA.floors.length;
  document.getElementById('legend').innerHTML = `
    <div class="row"><b style="color:var(--ink)">${emps}명</b>의 직원이
      <b style="color:var(--ink)">${depts}개 부서</b>에서 근무 중입니다.
      테두리 색 = 신호등. 캐릭터를 클릭하면 상태를 바꿀 수 있고,
      사이트가 죽으면 담당 캐릭터가 빨개집니다.</div>
    <span><i style="background:var(--sig-green)"></i>근무 (운영중)</span>
    <span><i style="background:var(--sig-yellow)"></i>준비</span>
    <span><i style="background:var(--sig-red)"></i>점검 (다운)</span>
    <span><i style="background:var(--sig-blue)"></i>대기 (계획중)</span>`;
}

function renderTodos(){
  const planned=[];
  DATA.floors.forEach(f=>f.employees.forEach(e=>(e.tasks||[]).forEach(t=>{
    if(t.state==="계획중") planned.push({title:t.title,who:e.name});
  })));
  document.getElementById('todoCount').textContent = planned.length;
  document.getElementById('todoGrid').innerHTML = planned.map(p=>
    `<div class="todo"><span class="check"></span><span class="txt">${p.title}</span><span class="who">${p.who}</span></div>`).join('');
}

function render(){
  document.getElementById('coName').textContent = (DATA.company && DATA.company.name) || '온라인상사';
  officeEl.innerHTML = DATA.floors.map(roomCard).join('');
  officeBottomEl.innerHTML = meetingLoungeHTML();
  renderLegend();
  renderTodos();
}

/* ----- modal ----- */
function findEmp(level,i){return DATA.floors.find(f=>f.level===level).employees[i];}
let cur=null;
function openModal(level,i){
  const e=findEmp(level,i); cur={level,i};
  const tasks=e.tasks||[];
  const live=tasks.filter(t=>t.state==="운영중"), plan=tasks.filter(t=>t.state==="계획중");
  const row=(t,cls)=>`<div class="titem ${cls}"><span class="tdot"></span>${t.title}</div>`;
  document.getElementById('modal').innerHTML=`
    <div class="mhead">${figSVG(e)}<div><div class="mname jua">${e.lead?'★ ':''}${e.name}</div></div></div>
    <div class="mrole">${level}F · ${e.role}</div>
    ${e.site?`<div class="msite">${e.site}</div>`:''}
    ${live.length?`<div class="tsec">운영중</div>${live.map(t=>row(t,'live-on')).join('')}`:''}
    ${plan.length?`<div class="tsec">계획중 (할 일판)</div>${plan.map(t=>row(t,'plan-on')).join('')}`:''}
    <div class="mbtns">
      <button class="btn-down" onclick="setStatus('red')">사이트 다운</button>
      <button class="btn-up" onclick="setStatus('green')">정상 복구</button>
      <button class="btn-close" onclick="closeModal()">닫기</button>
    </div>`;
  document.getElementById('scrim').classList.add('on');
}
function closeModal(){document.getElementById('scrim').classList.remove('on');}
function setStatus(s){
  const e=findEmp(cur.level,cur.i); e.status=s;
  render(); // 신호등 + 방 테두리 + 모니터링 상태 갱신
}

/* ----- live clock ----- */
function tick(){
  const d=new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick,1000);

/* ----- load data (단일 소스: employees.json) ----- */
async function init(){
  try{
    const res = await fetch('employees.json', {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    DATA = await res.json();
    render();
  }catch(err){
    officeEl.innerHTML =
      `<div style="padding:24px;text-align:center;color:#ff9a9a;font-weight:600">
         employees.json을 불러오지 못했습니다 — ${err.message}<br>
         <span style="font-weight:400;color:var(--muted)">로컬에서 열 때는 file:// 가 아니라
         로컬 서버(예: <code>python -m http.server 8123</code>)로 열어주세요.</span>
       </div>`;
  }
}
init();
</script>
